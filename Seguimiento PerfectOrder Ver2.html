<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Lista de Cartas - Perfect Order Master Set</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #141419; color: #fff; padding: 20px; margin: 0; }
        header { text-align: center; margin-bottom: 20px; background: #1f1f2a; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #2d2d3d; position: relative; }
        h1 { margin: 0 0 10px 0; color: #ffcb05; text-shadow: 2px 2px #3b4cca; font-size: 2.2em; }
        .setup-panel { margin-bottom: 15px; }
        
        .lang-panel { position: absolute; top: 15px; right: 15px; }
        .lang-panel select { padding: 5px 10px; font-size: 0.9em; min-width: auto; }

        .filter-panel { 
            background: #1f1f2a; padding: 15px; border-radius: 12px; margin-bottom: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: flex; flex-wrap: wrap; 
            gap: 15px; justify-content: center; align-items: center; border: 1px solid #2d2d3d;
        }
        .filter-group { display: flex; flex-direction: column; text-align: left; gap: 5px; }
        .filter-group label { font-size: 0.85em; color: #ffcb05; font-weight: bold; }

        input, button, select { padding: 10px; font-size: 1em; border-radius: 6px; background-color: #2d2d3d; color: white; border: 1px solid #3d3d52; }
        input[type="text"] { width: 180px; text-align: center; }
        input[type="text"]::placeholder { color: #777; }
        select { cursor: pointer; min-width: 160px; }
        
        button { background-color: #3b4cca; color: white; cursor: pointer; font-weight: bold; transition: all 0.2s; }
        button:hover { background-color: #2a3a9c; transform: scale(1.02); }
        
        .stats { font-size: 1.2em; font-weight: bold; margin-top: 15px; color: #a3ffb4; background: rgba(163, 255, 180, 0.1); padding: 8px 15px; border-radius: 20px; display: inline-block; }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1500px; margin: 0 auto; }
        
        .card-slot { 
            background: #1f1f2a; padding: 10px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.6); 
            text-align: center; transition: all 0.25s ease; border: 2px solid #2d2d3d;
            display: flex; flex-direction: column; justify-content: space-between; position: relative; overflow: hidden;
        }
        .card-slot:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.8); }
        
        .img-container { 
            position: relative; background: #141419; border-radius: 6px; aspect-ratio: 245/342; 
            display: flex; align-items: center; justify-content: center; margin-bottom: 8px; cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .img-container:hover { transform: scale(1.03); box-shadow: 0 0 15px rgba(255, 255, 255, 0.15); z-index: 2; }
        
        .card-slot img { max-width: 100%; height: auto; border-radius: 6px; opacity: 0.15; filter: grayscale(100%) blur(1px); transition: all 0.3s ease; }
        .card-slot.collected img { opacity: 1; filter: grayscale(0%) blur(0); }
        
        .variant-badge { font-size: 0.75em; font-weight: bold; padding: 3px 8px; border-radius: 4px; display: inline-block; text-transform: uppercase; letter-spacing: 0.5px; }

        .variant-badge.normal { background: #3a3a4a; color: #aaa; }
        .card-slot.collected .variant-badge.normal { background: #5a5a6e; color: #fff; }

        .variant-badge.holo { background: #0e5e4a; color: #a3ffb4; }
        .card-slot.collected .variant-badge.holo { background: linear-gradient(45deg, #11998e, #38ef7d); color: #111; }

        .variant-badge.ex { background: #6e5d0f; color: #ffd700; }
        .card-slot.collected .variant-badge.ex { background: linear-gradient(45deg, #f1c40f, #e67e22); color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .variant-badge.reverse { background: #4a3a2a; color: #bcaaa4; }
        .variant-badge.full-art { background: transparent; color: #ffd700; font-size: 1.2em; letter-spacing: 1px; }
        .card-slot.collected .variant-badge.full-art { color: #ffe566; text-shadow: 0 0 6px rgba(255, 215, 0, 0.7); }
        
        .slot-regular { border-color: #3a3a4a; }
        .slot-regular.collected { border-color: #4a90e2; box-shadow: 0 0 10px rgba(74, 144, 226, 0.3); }

        .slot-reverse { border-color: #4a3a2a; }
        .slot-reverse.collected { border-color: #ff9f43; box-shadow: 0 0 12px rgba(255, 159, 67, 0.5); background: linear-gradient(145deg, #1f1f2a 0%, #2d2218 100%); }
        .slot-reverse.collected .variant-badge.reverse { background: linear-gradient(45deg, #ff9f43, #ff5252); color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .slot-purple-range { border-color: #3d1f5c; background: #241336; }
        .slot-purple-range.collected { border-color: #8e44ad; box-shadow: 0 0 12px rgba(142, 68, 173, 0.6); background: linear-gradient(145deg, #3d1f5c 0%, #562985 100%); }

        .slot-gold-range { border-color: #5c4a1f; background: #362b13; }
        .slot-gold-range.collected { border-color: #ffd700; box-shadow: 0 0 15px rgba(255, 215, 0, 0.6); background: linear-gradient(145deg, #7a6229 0%, #b8953d 100%); }

        .high-rarity-tag { background: rgba(0, 0, 0, 0.8); padding: 4px 8px; border-radius: 6px; font-size: 0.75em; font-weight: bold; color: #fff; display: inline-flex; align-items: center; gap: 4px; border: 1px solid #d4af37; box-shadow: 0 2px 6px rgba(0,0,0,0.6); }
        .gold-star   { color: #ffd700; text-shadow: 0 0 5px rgba(255, 215, 0, 0.9); font-size: 1.1em; line-height: 1; }
        .silver-star { color: #c8d8e8; text-shadow: 0 0 5px rgba(180, 210, 240, 0.9); font-size: 1.1em; line-height: 1; }

        .stars-wrap { position: relative; display: inline-block; vertical-align: middle; }
        .stars-wrap.double { width: 22px; height: 17px; }
        .stars-wrap.triple { width: 29px; height: 23px; }
        .stars-wrap .star { position: absolute; line-height: 1; font-size: 1.05em; }
        .stars-wrap .star-1 { top: 0px; left: 0px; }
        .stars-wrap .star-2 { top: 6px; left: 9px; }
        .stars-wrap .star-3 { top: 12px; left: 18px; }
        
        .card-info { margin: 5px 0 10px 0; font-size: 0.85em; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-name { font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #fff; }
        .card-number { color: #aaa; font-size: 0.85em; display: block; margin-top: 2px; }
        .card-rarity { color: #ffcb05; font-size: 0.75em; font-style: italic; display: block; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .action-button { width: 100%; padding: 8px; font-size: 0.85em; font-weight: bold; border-radius: 5px; cursor: pointer; transition: all 0.2s; background: #2d2d3d; color: #aaa; border: 1px solid #3d3d52; }
        .card-slot.collected .action-button { background: #27ae60; color: white; border-color: #2ecc71; }
        .slot-reverse.collected .action-button { background: #e67e22; color: white; border-color: #f39c12; }
        .slot-purple-range.collected .action-button, .slot-gold-range.collected .action-button { background: #8e44ad; color: white; border-color: #9b59b6; }

        .loading { text-align: center; font-size: 1.5em; margin-top: 20px; color: #ffcb05; font-weight: bold; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(5px); cursor: zoom-out; }
        .modal-overlay img { max-width: 90%; max-height: 90vh; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); animation: popIn 0.25s ease-out; }
        @keyframes popIn { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div class="lang-panel">
            <select id="lang-selector">
                <option value="es">Español</option>
                <option value="en">English</option>
            </select>
        </div>
        <h1 id="txt-title">Master Set - Perfect Order</h1>
        <div class="setup-panel">
            <label for="set-id-input" id="txt-label-set">ID del Set en la API: </label>
            <input type="text" id="set-id-input" value="sv4"> 
            <button id="txt-btn-load">Cargar Set</button>
        </div>
        <div class="stats" id="stats-container">Introduce un ID de set y pulsa Cargar.</div>
    </header>

    <div class="filter-panel" id="filter-panel" style="display: none;">
        <div class="filter-group">
            <label for="search-input" id="txt-filter-search">Buscar</label>
            <input type="text" id="search-input" placeholder="Nombre o Nº...">
        </div>
        <div class="filter-group">
            <label for="rarity-filter" id="txt-filter-rarity">Rareza</label>
            <select id="rarity-filter"></select>
        </div>
        <div class="filter-group">
            <label for="variant-filter" id="txt-filter-variant">Filtro de Variante</label>
            <select id="variant-filter">
                <option value="all"></option>
                <option value="regular"></option>
                <option value="reverse"></option>
            </select>
        </div>
        <div class="filter-group">
            <label for="status-filter" id="txt-filter-status">Colección</label>
            <select id="status-filter">
                <option value="all"></option>
                <option value="collected"></option>
                <option value="missing"></option>
            </select>
        </div>
        <div class="filter-group">
            <label for="sort-order" id="txt-filter-sort">Ordenar por</label>
            <select id="sort-order">
                <option value="num-asc"></option>
                <option value="num-desc"></option>
                <option value="name-asc"></option>
                <option value="name-desc"></option>
            </select>
        </div>
    </div>

    <div id="loading-msg" class="loading" style="display: none;">Consultando la API de Pokémon TCG... por favor espera.</div>
    <div class="grid" id="card-container"></div>

    <div id="preview-modal" class="modal-overlay">
        <img id="preview-img" src="" alt="Previsualización Ampliada">
    </div>

<script type="module">
        // 1. IMPORTACIÓN DE COMPONENTES DE FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

        // 2. CREDENCIALES DE TU PROYECTO
        // IMPORTANTE: Asegúrate de completar tus datos reales aquí abajo y que figure el databaseURL
        const firebaseConfig = {
            apiKey: "TU_API_KEY_AQUÍ",
            authDomain: "TU_AUTH_DOMAIN_AQUÍ",
            databaseURL: "TU_DATABASE_URL_AQUÍ", 
            projectId: "TU_PROJECT_ID_AQUÍ",
            storageBucket: "TU_STORAGE_BUCKET_AQUÍ",
            messagingSenderId: "TU_MESSAGING_SENDER_ID_AQUÍ",
            appId: "TU_APP_ID_AQUÍ"
        };

        // Inicializamos la conexión con Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Variables de estado de la App
        let currentCardsData = [];
        let collection = {};
        let currentSetId = "";
        let currentLang = "es";

        // Diccionario de Idiomas
        const i18n = {
            es: {
                title: "Master Set - Perfect Order", labelSet: "ID del Set en la API: ", btnLoad: "Cargar Set",
                initStatus: "Introduce un ID de set y pulsa Cargar.", loading: "Cargando...",
                apiMsg: "Consultando la API de Pokémon TCG... por favor espera.", filterSearch: "Buscar",
                filterRarity: "Rareza", filterVariant: "Filtro de Variante", filterStatus: "Colección",
                filterSort: "Ordenar por", allRarities: "Todas", allVariants: "Todas",
                onlyRegular: "Normal / Holo", onlyReverse: "Reverse Holo", allSlots: "Todos los Slots",
                collectedSlots: "Obtenidas", missingSlots: "Buscando", numAsc: "Menor a Mayor",
                numDesc: "Mayor a Menor", nameAsc: "A - Z", nameDesc: "Z - A",
                noSlots: "No hay compartimentos que coincidan con los filtros.", progress: "Progreso Master Set",
                slotsCompleted: "espacios completados", cardCollected: "✓ Obtenida", cardMissing: "✕ No la tengo"
            },
            en: {
                title: "Master Set - Perfect Order", labelSet: "Set ID in API: ", btnLoad: "Load Set",
                initStatus: "Enter a set ID and press Load.", loading: "Loading...",
                apiMsg: "Querying Pokémon TCG API... please wait.", filterSearch: "Search",
                filterRarity: "Rarity", filterVariant: "Variant Filter", filterStatus: "Collection",
                filterSort: "Sort by", allRarities: "All Rarities", allVariants: "All Variants",
                onlyRegular: "Regular / Holo Only", onlyReverse: "Reverse Holo Only", allSlots: "View All Slots",
                collectedSlots: "Collected Slots", missingSlots: "Missing Slots", numAsc: "Number: Low to High",
                numDesc: "Number: High to Low", nameAsc: "Name: A - Z", nameDesc: "Name: Z - A",
                noSlots: "No slots match your filters.", progress: "Master Set Progress",
                slotsCompleted: "slots completed", cardCollected: "✓ Collected", cardMissing: "✕ Not Collected"
            }
        };

        const rarityMap = {
            'Common': 'Común', 'Uncommon': 'Poco Común', 'Rare': 'Rara', 'Rare Holo': 'Rara Holo',
            'Double Rare': 'Doble Rara', 'Promo': 'Promocional'
        };

        const rarityVisualMap = {
            'Common':                    { variants: ['regular', 'reverse'], badge: 'Normal',  badgeClass: 'normal',    slotClass: 'slot-regular',      tagType: null,        starCount: 0, starStyle: 'gold',   translateES: true  },
            'Uncommon':                  { variants: ['regular', 'reverse'], badge: 'Normal',  badgeClass: 'normal',    slotClass: 'slot-regular',      tagType: null,        starCount: 0, starStyle: 'gold',   translateES: true  },
            'Rare':                      { variants: ['regular', 'reverse'], badge: 'Normal',  badgeClass: 'normal',    slotClass: 'slot-regular',      tagType: null,        starCount: 0, starStyle: 'gold',   translateES: true  },
            'Rare Holo':                 { variants: ['regular', 'reverse'], badge: 'Holo',    badgeClass: 'holo',      slotClass: 'slot-regular',      tagType: null,        starCount: 0, starStyle: 'gold',   translateES: true  },
            'Double Rare':               { variants: ['regular'],            badge: 'Ex',      badgeClass: 'ex',        slotClass: 'slot-regular',      tagType: null,        starCount: 0, starStyle: 'gold',   translateES: true  },
            'Ultra Rare':                { variants: ['full-art'],           badge: '★★',     badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 2, starStyle: 'silver', translateES: false  },
            'Illustration Rare':         { variants: ['full-art'],           badge: '★',      badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 1, starStyle: 'gold',   translateES: false },
            'Special Illustration Rare': { variants: ['full-art'],           badge: '★★',     badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 2, starStyle: 'gold',   translateES: false },
            'Hyper Rare':                { variants: ['full-art'],           badge: '★★★',    badgeClass: 'full-art',  slotClass: 'slot-gold-range',   tagType: 'gold-star', starCount: 3, starStyle: 'gold',   translateES: false },
            'Mega Hyper Rare':           { variants: ['full-art'],           badge: '★★★',    badgeClass: 'full-art',  slotClass: 'slot-gold-range',   tagType: 'gold-star', starCount: 3, starStyle: 'gold',   translateES: false },
            'Rare Secret':               { variants: ['full-art'],           badge: '★★★',    badgeClass: 'full-art',  slotClass: 'slot-gold-range',   tagType: 'gold-star', starCount: 3, starStyle: 'gold',   translateES: false },
            'Rare Ultra':                { variants: ['full-art'],           badge: '★★',     badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 2, starStyle: 'silver', translateES: true  },
            'Rare Shiny':                { variants: ['full-art'],           badge: '✦',      badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 1, starStyle: 'gold',   translateES: false },
            'Rare Shiny GX':             { variants: ['full-art'],           badge: '✦✦',     badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 2, starStyle: 'gold',   translateES: false },
            'Promo':                     { variants: ['regular'],            badge: 'Promo',   badgeClass: 'normal',    slotClass: 'slot-regular',      tagType: null,        starCount: 0, starStyle: 'gold',   translateES: true  }
        };

        // ASIGNACIÓN DE EVENTOS SEGUROS (Evita errores de onclick en módulos)
        window.onload = function() {
            updateStaticTexts();
            
            // Asignamos los listeners directamente a los elementos HTML desde el script
            document.getElementById('lang-selector').addEventListener('change', changeLanguage);
            document.getElementById('txt-btn-load').addEventListener('click', loadSetFromAPI);
            document.getElementById('search-input').addEventListener('input', filterAndRender);
            document.getElementById('rarity-filter').addEventListener('change', filterAndRender);
            document.getElementById('variant-filter').addEventListener('change', filterAndRender);
            document.getElementById('status-filter').addEventListener('change', filterAndRender);
            document.getElementById('sort-order').addEventListener('change', filterAndRender);
            document.getElementById('preview-modal').addEventListener('click', closePreview);

            const savedSetId = localStorage.getItem('lastViewedSetId');
            if (savedSetId) {
                document.getElementById('set-id-input').value = savedSetId;
                loadSetFromAPI();
            }
        };

        function changeLanguage() {
            currentLang = document.getElementById('lang-selector').value;
            updateStaticTexts();
            if (currentCardsData.length > 0) {
                populateRarityFilter();
                filterAndRender();
            }
        }

        function updateStaticTexts() {
            const l = i18n[currentLang];
            document.getElementById('txt-title').innerText = l.title;
            document.getElementById('txt-label-set').innerText = l.labelSet;
            document.getElementById('txt-btn-load').innerText = l.btnLoad;
            document.getElementById('loading-msg').innerText = l.apiMsg;
            
            // Verificamos de forma segura que el panel de filtros exista antes de traducir sus etiquetas
            const filterPanel = document.getElementById('filter-panel');
            if (filterPanel) {
                document.getElementById('txt-filter-search').innerText = l.filterSearch;
                document.getElementById('txt-filter-rarity').innerText = l.filterRarity;
                document.getElementById('txt-filter-variant').innerText = l.filterVariant;
                document.getElementById('txt-filter-status').innerText = l.filterStatus;
                document.getElementById('txt-filter-sort').innerText = l.filterSort;
            }

            if (currentCardsData.length === 0) {
                document.getElementById('stats-container').innerText = l.initStatus;
            }
        }

        async function loadSetFromAPI() {
            const setId = document.getElementById('set-id-input').value.trim().toLowerCase();
            if (!setId) return alert(currentLang === 'es' ? "Por favor, ingresa un ID de set válido." : "Please enter a valid set ID.");

            currentSetId = setId;
            localStorage.setItem('lastViewedSetId', setId);

            const loadingMsg = document.getElementById('loading-msg');
            const container = document.getElementById('card-container');
            const statsContainer = document.getElementById('stats-container');
            const filterPanel = document.getElementById('filter-panel');
            
            loadingMsg.style.display = 'block';
            filterPanel.style.display = 'none';
            container.innerHTML = '';
            statsContainer.innerText = i18n[currentLang].loading;

            try {
                const response = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${setId}&orderBy=number`);
                const result = await response.json();

                if (!result.data || result.data.length === 0) {
                    throw new Error(currentLang === 'es' ? "No se encontraron cartas para este ID de set." : "No cards found for this set ID.");
                }

                currentCardsData = result.data;

                // ESCUCHA EN TIEMPO REAL DESDE FIREBASE
                const collectionRef = ref(db, `masterSet_${currentSetId}`);
                onValue(collectionRef, (snapshot) => {
                    collection = snapshot.val() || {};

                    currentCardsData.forEach(card => {
                        if (!collection[card.id]) {
                            collection[card.id] = { regular: false, reverse: false, 'full-art': false };
                        }
                    });

                    populateRarityFilter();
                    filterPanel.style.display = 'flex';
                    filterAndRender(); 
                });

            } catch (error) {
                alert((currentLang === 'es' ? "Error al cargar el set: " : "Error loading set: ") + error.message);
                statsContainer.innerText = currentLang === 'es' ? "Error al cargar." : "Error loading.";
            } finally {
                loadingMsg.style.display = 'none';
            }
        }

        function populateRarityFilter() {
            const rarityFilter = document.getElementById('rarity-filter');
            const l = i18n[currentLang];
            
            const savedSelectedRarity = rarityFilter.value || "all";
            rarityFilter.innerHTML = `<option value="all">${l.allRarities}</option>`;

            const rarityOrderES = ['Común', 'Poco Común', 'Rara', 'Rara Holo', 'Doble Rara', 'Ultra Rare', 'Illustration Rare', 'Special Illustration Rare', 'Hyper Rare', 'Mega Hyper Rare'];
            const rarityOrderEN = ['Common', 'Uncommon', 'Rare', 'Rare Holo', 'Double Rare', 'Ultra Rare', 'Illustration Rare', 'Special Illustration Rare', 'Hyper Rare', 'Mega Hyper Rare'];
            const fixedOrder = currentLang === 'es' ? rarityOrderES : rarityOrderEN;

            const presentRarities = new Set(currentCardsData.map(card => {
                const rarity = card.rarity || 'Common';
                const profile = rarityVisualMap[rarity] || {};
                const isHighRarity = profile.variants?.includes('full-art');
                const shouldTranslate = currentLang === 'es' && rarityMap[rarity] && (!isHighRarity || profile.translateES);
                return shouldTranslate ? rarityMap[rarity] : rarity;
            }));

            fixedOrder.concat([...presentRarities].filter(x => !fixedOrder.includes(x))).forEach(rarity => {
                if (presentRarities.has(rarity)) {
                    const option = document.createElement('option');
                    option.value = rarity;
                    option.innerText = rarity;
                    rarityFilter.appendChild(option);
                }
            });

            rarityFilter.value = savedSelectedRarity;

            const variantFilter = document.getElementById('variant-filter');
            variantFilter.options[0].text = l.allVariants;
            variantFilter.options[1].text = l.onlyRegular;
            variantFilter.options[2].text = l.onlyReverse;

            const statusFilter = document.getElementById('status-filter');
            statusFilter.options[0].text = l.allSlots;
            statusFilter.options[1].text = l.collectedSlots;
            statusFilter.options[2].text = l.missingSlots;

            const sortOrder = document.getElementById('sort-order');
            sortOrder.options[0].text = l.numAsc;
            sortOrder.options[1].text = l.numDesc;
            sortOrder.options[2].text = l.nameAsc;
            sortOrder.options[3].text = l.nameDesc;
        }

        function filterAndRender() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
            const selectedRarity = document.getElementById('rarity-filter').value;
            const selectedVariant = document.getElementById('variant-filter').value;
            const selectedStatus = document.getElementById('status-filter').value;
            const sortOrder = document.getElementById('sort-order').value;

            let masterSetSlots = [];

            currentCardsData.forEach(card => {
                const cardNum = parseInt(card.number.replace(/\D/g, '')) || 0;
                const rarity = card.rarity || 'Common';

                let profile = rarityVisualMap[rarity];
                if (!profile) {
                    const hasNormal  = !card.finishes || card.finishes.includes('normal') || card.finishes.includes('holofoil');
                    const hasReverse = card.finishes && card.finishes.includes('reverseHolofoil');
                    profile = {
                        variants: hasNormal ? (hasReverse ? ['regular', 'reverse'] : ['regular']) : ['regular'],
                        badge: 'Normal', badgeClass: 'normal', slotClass: 'slot-regular', tagType: null
                    };
                }

                const isHighRarity = profile.variants.includes('full-art');
                const shouldTranslate = currentLang === 'es' && rarityMap[rarity] && (!isHighRarity || profile.translateES);
                const translatedRarity = shouldTranslate ? rarityMap[rarity] : rarity;

                profile.variants.forEach(variant => {
                    if (!collection[card.id]) collection[card.id] = {};
                    if (collection[card.id][variant] === undefined) collection[card.id][variant] = false;

                    masterSetSlots.push({
                        ...card,
                        displayRarity: translatedRarity,
                        slotVariant:   variant,
                        badgeText:     variant === 'reverse' ? 'Reverse Holo' : profile.badge,
                        badgeClass:    variant === 'reverse' ? 'reverse'      : profile.badgeClass,
                        slotClass:     variant === 'reverse' ? 'slot-reverse' : profile.slotClass,
                        tagType:       variant !== 'reverse' ? profile.tagType : null,
                        starCount:     profile.starCount,
                        starStyle:     profile.starStyle,
                        isCollected:   collection[card.id][variant],
                        numericSort:   cardNum
                    });
                });
            });

            let filteredSlots = masterSetSlots.filter(slot => {
                const matchesSearch = slot.name.toLowerCase().includes(searchTerm) || slot.number.toLowerCase().includes(searchTerm);
                const matchesRarity = (selectedRarity === 'all') || (slot.displayRarity === selectedRarity);
                const matchesVariant = (selectedVariant === 'all') || (slot.slotVariant === selectedVariant);
                
                let matchesStatus = true;
                if (selectedStatus === 'collected') matchesStatus = slot.isCollected;
                if (selectedStatus === 'missing') matchesStatus = !slot.isCollected;

                return matchesSearch && matchesRarity && matchesVariant && matchesStatus;
            });

            filteredSlots.sort((a, b) => {
                if (sortOrder.startsWith('num')) {
                    if (a.numericSort !== b.numericSort) return sortOrder === 'num-asc' ? a.numericSort - b.numericSort : b.numericSort - a.numericSort;
                    if (a.number !== b.number) return sortOrder === 'num-asc' ? a.number.localeCompare(b.number) : b.number.localeCompare(a.number);
                } else {
                    if (a.name !== b.name) return sortOrder === 'name-asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
                }
                return a.slotVariant === 'regular' ? -1 : (a.slotVariant === 'reverse' ? 0 : 1);
            });

            renderSlots(filteredSlots, masterSetSlots.length, masterSetSlots.filter(s => s.isCollected).length);
        }

        function renderSlots(slotsToRender, totalSlotsGlobal, collectedSlotsGlobal) {
            const container = document.getElementById('card-container');
            const statsContainer = document.getElementById('stats-container');
            const l = i18n[currentLang];
            container.innerHTML = '';

            slotsToRender.forEach(slot => {
                const slotDiv = document.createElement('div');
                slotDiv.className = `card-slot ${slot.slotClass} ${slot.isCollected ? 'collected' : ''}`;

                let topHtml = '';

                if (slot.tagType === 'gold-star') {
                    const starClass = slot.starStyle === 'silver' ? 'silver-star' : 'gold-star';
                    let starsHtml = `<span class="${starClass}">★</span>`;
                    if (slot.starCount > 1) {
                        starsHtml = `<div class="stars-wrap ${slot.starCount === 2 ? 'double' : 'triple'}">` + 
                            Array.from({length: slot.starCount}, (_, i) => `<span class="star star-${i+1} ${starClass}">★</span>`).join('') + 
                            `</div>`;
                    }
                    topHtml = `<div class="high-rarity-tag">${starsHtml}<span>${slot.displayRarity}</span></div>`;
                } else {
                    topHtml = `<span class="variant-badge ${slot.badgeClass}">${slot.badgeText}</span>`;
                }

                // Generamos la estructura del Slot
                slotDiv.innerHTML = `
                    <div style="min-height: 24px; margin-bottom: 6px;">${topHtml}</div>
                    <div>
                        <div class="img-container" title="${currentLang === 'es' ? 'Ampliar' : 'Enlarge'}">
                            <img src="${slot.images.small}" alt="${slot.name}" loading="lazy">
                        </div>
                        <div class="card-info">
                            <span class="card-name" title="${slot.name}">${slot.name}</span>
                            <span class="card-number">Nº ${slot.number} / ${slot.set.printedTotal}</span>
                            <span class="card-rarity" title="${slot.displayRarity}">${slot.displayRarity}</span>
                        </div>
                    </div>
                    <button class="action-button">
                        ${slot.isCollected ? l.cardCollected : l.cardMissing}
                    </button>
                `;

                // Agregamos eventos interactivos dinámicamente de forma segura dentro del módulo
                slotDiv.querySelector('.img-container').addEventListener('click', () => {
                    openPreview(slot.images.large || slot.images.small);
                });

                slotDiv.querySelector('.action-button').addEventListener('click', () => {
                    toggleSlot(slot.id, slot.slotVariant);
                });

                container.appendChild(slotDiv);
            });

            if (slotsToRender.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #aaa; margin-top: 30px; font-size: 1.1em;">${l.noSlots}</div>`;
            }

            const percentage = totalSlotsGlobal > 0 ? ((collectedSlotsGlobal / totalSlotsGlobal) * 100).toFixed(1) : 0;
            statsContainer.innerText = `${l.progress} [${currentSetId.toUpperCase()}]: ${collectedSlotsGlobal} / ${totalSlotsGlobal} ${l.slotsCompleted} (${percentage}%)`;
        }

        function toggleSlot(cardId, variantType) {
            if (collection[cardId]) {
                const currentStatus = collection[cardId][variantType];
                const slotRef = ref(db, `masterSet_${currentSetId}/${cardId}/${variantType}`);
                set(slotRef, !currentStatus);
            }
        }

        function openPreview(url) {
            const modal = document.getElementById('preview-modal');
            const img = document.getElementById('preview-img');
            img.src = url;
            modal.style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('preview-modal').style.display = 'none';
            document.getElementById('preview-img').src = '';
        }
</script>
</body>
</html>
