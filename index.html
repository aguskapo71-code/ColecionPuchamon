<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Lista de Cartas - Perfect Order Master Set</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #141419; color: #fff; padding: 20px; margin: 0; }
        
        /* ==========================================================================
           PANTALLA DE LOGIN Y REGISTRO (DISEÑO PREMIUM CENTRADO)
           ========================================================================== */
        .auth-overlay { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: #141419; 
            z-index: 2000; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
        }
        
        .auth-card { 
            background: #1f1f2a; 
            padding: 40px 30px; 
            border-radius: 16px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            border: 1px solid #2d2d3d; 
            width: 100%; 
            max-width: 400px; 
            text-align: center; 
            box-sizing: border-box;
        }
        
        .auth-card h2 { margin: 0 0 10px 0; color: #ffcb05; text-shadow: 1px 1px #3b4cca; font-size: 1.8em; }
        .auth-card p { color: #aaa; font-size: 0.9em; margin-bottom: 25px; }
        
        .auth-group { display: flex; flex-direction: column; text-align: left; gap: 5px; margin-bottom: 15px; }
        .auth-group label { font-size: 0.85em; color: #ffcb05; font-weight: bold; }
        .auth-group input { padding: 12px; font-size: 1em; border-radius: 8px; background: #2d2d3d; border: 1px solid #3d3d52; color: white; }
        
        .auth-btn { width: 100%; padding: 12px; font-size: 1.05em; font-weight: bold; border-radius: 8px; background: #3b4cca; color: white; cursor: pointer; border: none; margin-top: 10px; transition: background 0.2s; }
        .auth-btn:hover { background: #2a3a9c; }
        
        .auth-switch { margin-top: 20px; font-size: 0.88em; color: #aaa; }
        .auth-switch span { color: #ffcb05; cursor: pointer; font-weight: bold; text-decoration: underline; }

        /* ==========================================================================
           ESTILOS DE LA APLICACIÓN PRINCIPAL
           ========================================================================== */
        header { text-align: center; margin-bottom: 20px; background: #1f1f2a; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #2d2d3d; position: relative; }
        h1 { margin: 0 0 10px 0; color: #ffcb05; text-shadow: 2px 2px #3b4cca; font-size: 2.2em; }
        .setup-panel { margin-bottom: 15px; }
        
        /* Controles superiores derechos (Idioma y Usuario) */
        .top-right-panel { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 10px; }
        .top-right-panel select { padding: 5px 10px; font-size: 0.9em; min-width: auto; background: #2d2d3d; color: white; border: 1px solid #3d3d52; border-radius: 6px; }
        .user-badge { background: #2d2d3d; padding: 6px 12px; border-radius: 20px; font-size: 0.85em; border: 1px solid #3d3d52; color: #a3ffb4; font-weight: bold; max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .btn-logout { background: #cc2e2e; color: white; padding: 6px 12px; font-size: 0.85em; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; }
        .btn-logout:hover { background: #b82323; }

        /* Panel de Filtros */
        .filter-panel { 
            background: #1f1f2a; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            align-items: center;
            border: 1px solid #2d2d3d;
        }
        .filter-group { display: flex; flex-direction: column; text-align: left; gap: 5px; }
        .filter-group label { font-size: 0.85em; color: #ffcb05; font-weight: bold; }

        input, button, select { padding: 10px; font-size: 1em; border-radius: 6px; border: none; background-color: #2d2d3d; color: white; border: 1px solid #3d3d52; }
        input[type="text"] { width: 180px; text-align: center; }
        input[type="text"]::placeholder { color: #777; }
        select { cursor: pointer; min-width: 160px; }
        
        button { background-color: #3b4cca; color: white; cursor: pointer; font-weight: bold; transition: all 0.2s; border: none; }
        button:hover { background-color: #2a3a9c; transform: scale(1.02); }
        
        .stats { font-size: 1.2em; font-weight: bold; margin-top: 15px; color: #a3ffb4; background: rgba(163, 255, 180, 0.1); padding: 8px 15px; border-radius: 20px; display: inline-block; }
        
        /* Grid estilo Carpeta Master Set */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; max-width: 1500px; margin: 0 auto; }
        
        /* Tarjeta / Slot de la Carpeta */
        .card-slot { 
            background: #1f1f2a; 
            padding: 10px; 
            border-radius: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.6); 
            text-align: center; 
            transition: all 0.25s ease; 
            border: 2px solid #2d2d3d;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }
        .card-slot:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.8); }
        
        /* Contenedor de Imagen con Efecto Hover y Puntero */
        .img-container { 
            position: relative; 
            background: #141419; 
            border-radius: 6px; 
            aspect-ratio: 245/342; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            margin-bottom: 8px; 
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .img-container:hover {
            transform: scale(1.03);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.15);
            z-index: 2;
        }
        
        .card-slot img { max-width: 100%; height: auto; border-radius: 6px; opacity: 0.15; filter: grayscale(100%) blur(1px); transition: all 0.3s ease; }
        
        /* Estados Activos / Coleccionados */
        .card-slot.collected img { opacity: 1; filter: grayscale(0%) blur(0); }
        
        /* Distintivos Visuales según variante (Dinámicos) */
        .variant-badge {
            font-size: 0.75em;
            font-weight: bold;
            padding: 3px 8px;
            border-radius: 4px;
            display: inline-block;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background 0.3s ease, color 0.3s ease;
        }

        /* Colores de las insignias y sus cambios de tonalidad al estar Obtenidas (.collected) */
        .variant-badge.normal { background: #3a3a4a; color: #aaa; }
        .card-slot.collected .variant-badge.normal { background: #5a5a6e; color: #fff; }

        .variant-badge.holo { background: #0e5e4a; color: #a3ffb4; }
        .card-slot.collected .variant-badge.holo { background: linear-gradient(45deg, #11998e, #38ef7d); color: #111; }

        .variant-badge.ex { background: #6e5d0f; color: #ffd700; }
        .card-slot.collected .variant-badge.ex { background: linear-gradient(45deg, #f1c40f, #e67e22); color: #fff; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }

        .variant-badge.reverse { background: #4a3a2a; color: #bcaaa4; }
        .variant-badge.full-art { background: transparent; color: #ffd700; font-size: 1.2em; letter-spacing: 1px; }
        .card-slot.collected .variant-badge.full-art { color: #ffe566; text-shadow: 0 0 6px rgba(255, 215, 0, 0.7); }
        
        /* Estilos diferenciados por tipo */
        .slot-regular { border-color: #3a3a4a; }
        .slot-regular.collected { border-color: #4a90e2; box-shadow: 0 0 10px rgba(74, 144, 226, 0.3); }

        .slot-reverse { border-color: #4a3a2a; }
        .slot-reverse.collected { 
            border-color: #ff9f43; 
            box-shadow: 0 0 12px rgba(255, 159, 67, 0.5);
            background: linear-gradient(145deg, #1f1f2a 0%, #2d2218 100%);
        }
        .slot-reverse.collected .variant-badge.reverse { 
            background: linear-gradient(45deg, #ff9f43, #ff5252); 
            color: #fff; 
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .slot-purple-range { border-color: #3d1f5c; background: #241336; }
        .slot-purple-range.collected {
            border-color: #8e44ad;
            box-shadow: 0 0 12px rgba(142, 68, 173, 0.6);
            background: linear-gradient(145deg, #3d1f5c 0%, #562985 100%);
        }

        .slot-gold-range { border-color: #5c4a1f; background: #362b13; }
        .slot-gold-range.collected {
            border-color: #ffd700;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            background: linear-gradient(145deg, #7a6229 0%, #b8953d 100%);
        }

        /* ==========================================================================
           RECUADRO NEGRO DE ALTAS RAREZAS (EXTRAÍDO DE REGISTRO COLECCION PO)
           ========================================================================== */
        .high-rarity-tag { 
            background-color: #000000; 
            border-radius: 4px; 
            padding: 3px 6px; 
            display: inline-flex; 
            align-items: center; 
            justify-content: center;
            gap: 5px; 
            max-width: calc(100% - 16px);
            box-sizing: border-box;
            overflow: hidden;
        }

        .stars-container { 
            display: inline-flex; 
            align-items: center; 
            gap: 1px; 
            flex-shrink: 0;
        }

        .gold-star   { color: #ffd700; text-shadow: 0 0 3px rgba(255, 215, 0, 0.6); font-size: 0.9em; line-height: 1; }
        .silver-star { color: #c8d8e8; text-shadow: 0 0 3px rgba(180, 210, 240, 0.6); font-size: 0.9em; line-height: 1; }
        
        .rainbow-star { 
            background: linear-gradient(135deg, #ff7675, #ffeaa7, #55efc4, #74b9ff, #a29bfe);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 1px rgba(255,255,255,0.3));
            font-size: 0.9em; 
            line-height: 1;
            animation: rainbowShift 4s ease infinite;
        }
        @keyframes rainbowShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .high-rarity-text { 
            color: #ffffff; 
            font-size: 0.72em; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: -0.2px; 
            white-space: nowrap; 
            overflow: hidden; 
            text-overflow: ellipsis;
        }
        
        /* Información del Cromo */
        .card-info { margin: 5px 0 10px 0; font-size: 0.85em; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        .card-name { font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: #fff; }
        .card-number { color: #aaa; font-size: 0.85em; display: block; margin-top: 2px; }
        .card-rarity { color: #ffcb05; font-size: 0.75em; font-style: italic; display: block; margin-top: 2px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        /* Botones de acción */
        .action-button {
            width: 100%;
            padding: 8px;
            font-size: 0.85em;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
            background: #2d2d3d;
            color: #aaa;
            border: 1px solid #3d3d52;
        }
        .card-slot.collected .action-button {
            background: #27ae60;
            color: white;
            border-color: #2ecc71;
        }
        .slot-reverse.collected .action-button {
            background: #e67e22;
            color: white;
            border-color: #f39c12;
        }
        .slot-purple-range.collected .action-button,
        .slot-gold-range.collected .action-button {
            background: #8e44ad;
            color: white;
            border-color: #9b59b6;
        }

        .loading { text-align: center; font-size: 1.5em; margin-top: 20px; color: #ffcb05; font-weight: bold; }

        /* Modal de Previsualización (Lightbox) */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
            cursor: zoom-out;
        }
        .modal-overlay img {
            max-width: 90%;
            max-height: 90vh;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            animation: popIn 0.25s ease-out;
        }
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-card">
            <h2 id="auth-title">Iniciar Sesión</h2>
            <p id="auth-subtitle">Ingresa a tu cuenta para guardar tu colección en la nube.</p>
            
            <div class="auth-group">
                <label id="lbl-email" for="auth-email">Correo Electrónico</label>
                <input type="email" id="auth-email" placeholder="ejemplo@correo.com">
            </div>
            
            <div class="auth-group">
                <label id="lbl-password" for="auth-password">Contraseña</label>
                <input type="password" id="auth-password" placeholder="Mínimo 6 caracteres">
            </div>
            
            <button id="btn-auth-submit" class="auth-btn">Entrar</button>
            
            <div class="auth-switch">
                <span id="btn-auth-switch">¿No tienes cuenta? Regístrate aquí</span>
            </div>
        </div>
    </div>

    <div id="app-content" style="display: none;">
        <header>
            <div class="top-right-panel">
                <div class="user-badge" id="user-display-email">usuario@correo.com</div>
                <button class="btn-logout" id="btn-logout" onclick="logoutUser()">Salir</button>
                <select id="lang-selector" onchange="changeLanguage()">
                    <option value="es">Español</option>
                    <option value="en">English</option>
                </select>
            </div>
            <h1 id="txt-title">Master Set - Perfect Order</h1>
            
            <div class="setup-panel">
                <label for="set-id-input" id="txt-label-set">ID del Set en la API: </label>
                <input type="text" id="set-id-input" value="sv4"> 
                <button onclick="loadSetFromAPI()" id="txt-btn-load">Cargar Set</button>
            </div>
            
            <div class="stats" id="stats-container">Introduce un ID de set y pulsa Cargar.</div>
        </header>

        <div class="filter-panel" id="filter-panel" style="display: none;">
            <div class="filter-group">
                <label for="search-input" id="txt-filter-search">Buscar / Search</label>
                <input type="text" id="search-input" placeholder="Nombre o Nº..." oninput="filterAndRender()">
            </div>

            <div class="filter-group">
                <label for="rarity-filter" id="txt-filter-rarity">Rareza / Rarity</label>
                <select id="rarity-filter" onchange="filterAndRender()">
                    <option value="all">Todas las rarezas</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="variant-filter" id="txt-filter-variant">Filtro de Variante</label>
                <select id="variant-filter" onchange="filterAndRender()">
                    <option value="all">Todas las Variantes</option>
                    <option value="regular">Solo Normal / Holo</option>
                    <option value="reverse">Solo Reverse Holo</option>
                    <option value="full-art" id="opt-variant-fa">Full Art</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="status-filter" id="txt-filter-status">Colección / Collection</label>
                <select id="status-filter" onchange="filterAndRender()">
                    <option value="all">Ver Todos los Slots</option>
                    <option value="collected">Espacios Conseguidos</option>
                    <option value="missing">Espacios Vacíos</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="mode-filter" id="txt-filter-mode">Modo de Visualización</label>
                <select id="mode-filter" onchange="filterAndRender()">
                    <option value="master">Modo: Carpeta Master Set</option>
                    <option value="normal">Modo: Set Base Estándar</option>
                </select>
            </div>

            <div class="filter-group">
                <label for="sort-order" id="txt-filter-sort">Ordenar por / Sort by</label>
                <select id="sort-order" onchange="filterAndRender()">
                    <option value="num-asc">Número: Menor a Mayor</option>
                    <option value="num-desc">Número: Mayor a Menor</option>
                    <option value="name-asc">Nombre: A - Z</option>
                    <option value="name-desc">Nombre: Z - A</option>
                </select>
            </div>
        </div>

        <div id="loading-msg" class="loading" style="display: none;">Consultando la API de Pokémon TCG... por favor espera.</div>
        <div class="grid" id="card-container"></div>
    </div>

    <div id="preview-modal" class="modal-overlay" onclick="closePreview()">
        <img id="preview-img" src="" alt="Previsualización Ampliada">
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-analytics.js";
        import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-database.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        
        // CONFIGURACIÓN DE TU PROYECTO FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAUTKnWjDW3GjrkW16lrr6Ld0_IdCLM_K8",
            authDomain: "guia-coleccion-pokemon.firebaseapp.com",
            databaseURL: "https://guia-coleccion-pokemon-default-rtdb.firebaseio.com",
            projectId: "guia-coleccion-pokemon",
            storageBucket: "guia-coleccion-pokemon.firebasestorage.app",
            messagingSenderId: "975098861721",
            appId: "1:975098861721:web:194e589302c1ff274b0008",
            measurementId: "G-D4798WC2GE"
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getDatabase(app);
        const auth = getAuth(app);

        // Variables de Control Global del script de Firebase
        let currentUser = null;
        let isLoginMode = true; 
        let currentCardsData = [];
        let collection = {};
        let currentSetId = "";
        let currentLang = "es";
        let isMasterSetMode = true;

        // Exponer funciones críticas globalmente para que funcionen con los atributos onClick nativos de tu HTML
        window.logoutUser = function() {
            signOut(auth).catch(err => alert("Error al cerrar sesión: " + err.message));
        };

        window.toggleSlot = function(cardId, variantType) {
            if (!currentUser) return; 
            if (collection[cardId]) {
                const currentStatus = collection[cardId][variantType];
                const slotRef = ref(db, `usuarios/${currentUser.uid}/masterSet_${currentSetId}/${cardId}/${variantType}`);
                set(slotRef, !currentStatus);
            }
        };

        // Escuchador de estado de autenticación (Firebase Auth)
        onAuthStateChanged(auth, (user) => {
            const authScreen = document.getElementById('auth-screen');
            const appContent = document.getElementById('app-content');
            const userDisplay = document.getElementById('user-display-email');

            if (user) {
                window.currentUser = user; 
                userDisplay.innerText = user.email;
                authScreen.style.display = 'none';
                appContent.style.display = 'block';

                const savedSetId = localStorage.getItem('lastViewedSetId');
                if (savedSetId) {
                    document.getElementById('set-id-input').value = savedSetId;
                    window.loadSetFromAPI();
                } else {
                    updateStaticTexts();
                }
            } else {
                window.currentUser = null;
                if (unsubscribeDatabase) { unsubscribeDatabase(); unsubscribeDatabase = null; }
                window.collection = {};
                authScreen.style.display = 'flex';
                appContent.style.display = 'none';
                resetAuthForm();
            }
        });

        // Enlace en tiempo real con Firebase Realtime Database para el Set activo
        window.syncCollectionWithFirebase = function() {
            if (!currentUser || !currentSetId) return;

            if (unsubscribeDatabase) { unsubscribeDatabase(); }

            const userSetRef = ref(db, `usuarios/${currentUser.uid}/masterSet_${currentSetId}`);
            
            unsubscribeDatabase = onValue(userSetRef, (snapshot) => {
                const data = snapshot.val() || {};
                
                window.collection = data;

                currentCardsData.forEach(card => {
                    if (!collection[card.id]) {
                        collection[card.id] = { regular: false, reverse: false, 'full-art': false };
                    } else {
                        if (collection[card.id].regular === undefined) collection[card.id].regular = false;
                        if (collection[card.id].reverse === undefined) collection[card.id].reverse = false;
                        if (collection[card.id]['full-art'] === undefined) collection[card.id]['full-art'] = false;
                    }
                });

                window.filterAndRender();
            });
        };

        // Lógica del Panel de Control de Autenticación (Cambio de Modo y Envío de Formularios)
        const btnAuthSubmit = document.getElementById('btn-auth-submit');
        const btnAuthSwitch = document.getElementById('btn-auth-switch');
        const txtAuthTitle = document.getElementById('auth-title');
        const txtAuthSubtitle = document.getElementById('auth-subtitle');

        btnAuthSwitch.addEventListener('click', () => {
            isLoginMode = !isLoginMode;
            if (isLoginMode) {
                txtAuthTitle.innerText = currentLang === 'es' ? "Iniciar Sesión" : "Sign In";
                txtAuthSubtitle.innerText = currentLang === 'es' ? "Ingresa a tu cuenta para guardar tu colección en la nube." : "Log in to save your collection to the cloud.";
                btnAuthSubmit.innerText = currentLang === 'es' ? "Entrar" : "Login";
                btnAuthSwitch.innerText = currentLang === 'es' ? "¿No tienes cuenta? Regístrate aquí" : "Don't have an account? Register here";
            } else {
                txtAuthTitle.innerText = currentLang === 'es' ? "Crear Cuenta" : "Create Account";
                txtAuthSubtitle.innerText = currentLang === 'es' ? "Regístrate gratis para empezar a sincronizar tu Master Set." : "Sign up for free to start syncing your Master Set.";
                btnAuthSubmit.innerText = currentLang === 'es' ? "Registrarme" : "Sign Up";
                btnAuthSwitch.innerText = currentLang === 'es' ? "¿Ya tienes una cuenta? Inicia sesión" : "Already have an account? Sign in";
            }
        });

        btnAuthSubmit.addEventListener('click', () => {
            const email = document.getElementById('auth-email').value.trim();
            const password = document.getElementById('auth-password').value;

            if (!email || !password) {
                alert(currentLang === 'es' ? "Por favor rellena todos los campos." : "Please fill in all fields.");
                return;
            }

            if (isLoginMode) {
                signInWithEmailAndPassword(auth, email, password).catch(err => alert("Error: " + err.message));
            } else {
                createUserWithEmailAndPassword(auth, email, password).catch(err => alert("Error: " + err.message));
            }
        });

        function resetAuthForm() {
            document.getElementById('auth-email').value = "";
            document.getElementById('auth-password').value = "";
        }
    </script>

            'Uncommon':                  { variants: ['regular', 'reverse'], badge: 'Normal',  badgeClass: 'normal',    slotClass: 'slot-regular',      tagType: null,        starCount: 0, starStyle: 'gold',   translateES: true  },

            'Rare Holo':                 { variants: ['regular', 'reverse'], badge: 'Holo',    badgeClass: 'holo',      slotClass: 'slot-regular',      tagType: null,        starCount: 0, starStyle: 'gold',   translateES: true  },
            'Double Rare':               { variants: ['regular'],            badge: 'Ex',      badgeClass: 'ex',        slotClass: 'slot-regular',      tagType: null,        starCount: 0, starStyle: 'gold',   translateES: true  },

            'Illustration Rare':         { variants: ['full-art'],           badge: '★',      badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 1, starStyle: 'gold',   translateES: false },
            'Special Illustration Rare': { variants: ['full-art'],           badge: '★★',     badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 2, starStyle: 'gold',   translateES: false },
            'Hyper Rare':                { variants: ['full-art'],           badge: '★★★',    badgeClass: 'full-art',  slotClass: 'slot-gold-range',   tagType: 'gold-star', starCount: 3, starStyle: 'gold',   translateES: false },
            'Mega Hyper Rare':           { variants: ['full-art'],           badge: '★★★',    badgeClass: 'full-art',  slotClass: 'slot-gold-range',   tagType: 'gold-star', starCount: 3, starStyle: 'gold',   translateES: false },
            'Rare Secret':               { variants: ['full-art'],           badge: '★★★',    badgeClass: 'full-art',  slotClass: 'slot-gold-range',   tagType: 'gold-star', starCount: 3, starStyle: 'gold',   translateES: false },
            'Rare Ultra':                { variants: ['full-art'],           badge: '★★',     badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 2, starStyle: 'silver', translateES: true  },
            'Rare Shiny':                { variants: ['full-art'],           badge: '✦',      badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 1, starStyle: 'gold',   translateES: false },
            'Rare Shiny GX':             { variants: ['full-art'],           badge: '✦✦',     badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 2, starStyle: 'gold',   translateES: false },
            'Promo':                     { variants: ['regular'],            badge: 'Promo',   badgeClass: 'normal',    slotClass: 'slot-regular',      tagType: null,        starCount: 0, starStyle: 'gold',   translateES: true  },
            'Rare Rainbow':              { variants: ['full-art'],           badge: '★',      badgeClass: 'full-art',  slotClass: 'slot-gold-range',   tagType: 'gold-star', starCount: 1, starStyle: 'rainbow', translateES: true },
            'Rare Holo VSTAR':           { variants: ['full-art'],           badge: '★',      badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 1, starStyle: 'silver',  translateES: true },
            'Middle Rare':               { variants: ['full-art'],           badge: '★',      badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 1, starStyle: 'silver',  translateES: true },
            'Rare Holo V':               { variants: ['full-art'],           badge: '★',      badgeClass: 'full-art',  slotClass: 'slot-purple-range', tagType: 'gold-star', starCount: 1, starStyle: 'silver',  translateES: true }
        };

        function changeLanguage() {
            currentLang = document.getElementById('lang-selector').value;
            updateStaticTexts();
            if (currentCardsData.length > 0) {
                populateRarityFilter();
                filterAndRender();
            }
        }

        function updateStaticTexts() {
            const l = i18n[currentLang];
            document.getElementById('txt-title').innerText = l.title;
            document.getElementById('txt-label-set').innerText = l.labelSet;
            document.getElementById('txt-btn-load').innerText = l.btnLoad;
            document.getElementById('loading-msg').innerText = l.apiMsg;
            
            document.getElementById('txt-filter-search').innerText = l.filterSearch;
            document.getElementById('txt-filter-rarity').innerText = l.filterRarity;
            document.getElementById('txt-filter-variant').innerText = l.filterVariant;
            document.getElementById('txt-filter-status').innerText = l.filterStatus;
            document.getElementById('txt-filter-mode').innerText = l.filterMode;
            document.getElementById('txt-filter-sort').innerText = l.filterSort;

            if (currentCardsData.length === 0) {
                document.getElementById('stats-container').innerText = l.initStatus;
            }
        }

        async function loadSetFromAPI() {
            const setId = document.getElementById('set-id-input').value.trim().toLowerCase();
            if (!setId) return alert(currentLang === 'es' ? "Por favor, ingresa un ID de set válido." : "Please enter a valid set ID.");

            currentSetId = setId;
            localStorage.setItem('lastViewedSetId', setId);

            const loadingMsg = document.getElementById('loading-msg');
            const container = document.getElementById('card-container');
            const statsContainer = document.getElementById('stats-container');
            const filterPanel = document.getElementById('filter-panel');
            
            loadingMsg.style.display = 'block';
            filterPanel.style.display = 'none';
            container.innerHTML = '';
            statsContainer.innerText = i18n[currentLang].loading;

            try {
                const response = await fetch(`https://api.pokemontcg.io/v2/cards?q=set.id:${setId}&orderBy=number`);
                const result = await response.json();

                if (!result.data || result.data.length === 0) {
                    throw new Error(currentLang === 'es' ? "No se encontraron cartas para este ID de set." : "No cards found for this set ID.");
                }

                currentCardsData = result.data;

                populateRarityFilter();

                document.getElementById('search-input').value = "";
                document.getElementById('rarity-filter').value = "all";
                document.getElementById('variant-filter').value = "all";
                document.getElementById('status-filter').value = "all";
                document.getElementById('mode-filter').value = "master"; 
                document.getElementById('sort-order').value = "num-asc";

                filterPanel.style.display = 'flex';

                if (window.syncCollectionWithFirebase) {
                    window.syncCollectionWithFirebase();
                } else {
                    filterAndRender();
                }

            } catch (error) {
                alert((currentLang === 'es' ? "Error al cargar el set: " : "Error loading set: ") + error.message);
                statsContainer.innerText = currentLang === 'es' ? "Error al cargar." : "Error loading.";
            } finally {
                loadingMsg.style.display = 'none';
            }
        }

        function populateRarityFilter() {
            const rarityFilter = document.getElementById('rarity-filter');
            const l = i18n[currentLang];
            rarityFilter.innerHTML = `<option value="all">${l.allRarities}</option>`;

            const rarityOrderES = ['Común', 'Poco Común', 'Rara', 'Rara Holo', 'Doble Rara', 'Ultra Rare', 'Illustration Rare', 'Special Illustration Rare', 'Hyper Rare', 'Mega Hyper Rare', 'Rare Secret', 'Rare Ultra', 'Rare Rainbow', 'Rare Holo VSTAR', 'Rare Holo V'];
            const rarityOrderEN = ['Common', 'Uncommon', 'Rare', 'Rare Holo', 'Double Rare', 'Ultra Rare', 'Illustration Rare', 'Special Illustration Rare', 'Hyper Rare', 'Mega Hyper Rare', 'Rare Secret', 'Rare Ultra', 'Rare Rainbow', 'Rare Holo VSTAR', 'Rare Holo V'];
            const fixedOrder = currentLang === 'es' ? rarityOrderES : rarityOrderEN;

            const presentRarities = new Set(currentCardsData.map(card => {
                const rarity = card.rarity || 'Common';
                const profile = rarityVisualMap[rarity];
                const isHighRarity = profile && profile.variants.includes('full-art');
                const shouldTranslate = currentLang === 'es' && rarityMap[rarity] && (!isHighRarity || (profile && profile.translateES));
                return shouldTranslate ? rarityMap[rarity] : rarity;
            }));

            fixedOrder.forEach(rarity => {
                if (presentRarities.has(rarity)) {
                    const option = document.createElement('option');
                    option.value = rarity;
                    option.innerText = rarity;
                    rarityFilter.appendChild(option);
                }
            });

            presentRarities.forEach(rarity => {
                if (!fixedOrder.includes(rarity)) {
                    const option = document.createElement('option');
                    option.value = rarity;
                    option.innerText = rarity;
                    rarityFilter.appendChild(option);
                }
            });

            const variantFilter = document.getElementById('variant-filter');
            variantFilter.options[0].text = l.allVariants;
            variantFilter.options[1].text = l.onlyRegular;
            variantFilter.options[2].text = l.onlyReverse;

            const statusFilter = document.getElementById('status-filter');
            statusFilter.options[0].text = l.allSlots;
            statusFilter.options[1].text = l.collectedSlots;
            statusFilter.options[2].text = l.missingSlots;

            const sortOrder = document.getElementById('sort-order');
            sortOrder.options[0].text = l.numAsc;
            sortOrder.options[1].text = l.numDesc;
            sortOrder.options[2].text = l.nameAsc;
            sortOrder.options[3].text = l.nameDesc;
        }

        function filterAndRender() {
            const searchTerm = document.getElementById('search-input').value.toLowerCase().trim();
            const selectedRarity = document.getElementById('rarity-filter').value;
            const selectedVariant = document.getElementById('variant-filter').value;
            const selectedStatus = document.getElementById('status-filter').value;
            const selectedMode = document.getElementById('mode-filter').value; 
            const sortOrder = document.getElementById('sort-order').value;

            const isMasterSetMode = (selectedMode === 'master');

            let masterSetSlots = [];

            currentCardsData.forEach(card => {
                const cardNum = parseInt(card.number.replace(/\D/g, '')) || 0;
                const rarity = card.rarity || 'Common';

                let profile = rarityVisualMap[rarity];
                if (!profile) {
                    const hasNormal  = !card.finishes || card.finishes.includes('normal') || card.finishes.includes('holofoil');
                    const hasReverse = card.finishes && card.finishes.includes('reverseHolofoil');
                    profile = {
                        variants:   hasNormal ? (hasReverse ? ['regular', 'reverse'] : ['regular']) : ['regular'],
                        badge:      'Normal',
                        badgeClass: 'normal',
                        slotClass:  'slot-regular',
                        tagType:    null
                    };
                }

                const isHighRarity = profile.variants.includes('full-art');
                const shouldTranslate = currentLang === 'es' && rarityMap[rarity] && (!isHighRarity || profile.translateES);
                const translatedRarity = shouldTranslate ? rarityMap[rarity] : rarity;

                // Determinamos qué variantes generar basados en el modo seleccionado
                let variantsToGenerate = [];
                if (isMasterSetMode) {
                    variantsToGenerate = profile.variants;
                } else {
                    variantsToGenerate = ['regular'];
                }

                variantsToGenerate.forEach(variant => {
                    if (!collection[card.id]) collection[card.id] = {};
                    if (collection[card.id][variant] === undefined) collection[card.id][variant] = false;

                    const badgeText  = variant === 'reverse' ? 'Reverse Holo' : profile.badge;
                    const badgeClass = variant === 'reverse' ? 'reverse'      : profile.badgeClass;
                    const slotClass  = variant === 'reverse' ? 'slot-reverse' : profile.slotClass;
                    const tagType    = variant !== 'reverse' ? profile.tagType : null;

                    masterSetSlots.push({
                        ...card,
                        displayRarity: translatedRarity,
                        slotVariant:   variant,
                        badgeText,
                        badgeClass,
                        slotClass,
                        tagType,
                        starCount:     profile.starCount,
                        starStyle:     profile.starStyle,
                        isCollected:   collection[card.id][variant],
                        numericSort:   cardNum
                    });
                });
            });

            let filteredSlots = masterSetSlots.filter(slot => {
                const matchesSearch = slot.name.toLowerCase().includes(searchTerm) || slot.number.toLowerCase().includes(searchTerm);
                const matchesRarity = (selectedRarity === 'all') || (slot.displayRarity === selectedRarity);
                const matchesVariant = (selectedVariant === 'all') || (slot.slotVariant === selectedVariant);
                
                let matchesStatus = true;
                if (selectedStatus === 'collected') matchesStatus = slot.isCollected;
                if (selectedStatus === 'missing') matchesStatus = !slot.isCollected;

                return matchesSearch && matchesRarity && matchesVariant && matchesStatus;
            });

            filteredSlots.sort((a, b) => {
                if (sortOrder.startsWith('num')) {
                    if (a.numericSort !== b.numericSort) return sortOrder === 'num-asc' ? a.numericSort - b.numericSort : b.numericSort - a.numericSort;
                    if (a.number !== b.number) return sortOrder === 'num-asc' ? a.number.localeCompare(b.number) : b.number.localeCompare(a.number);
                    return a.slotVariant === 'regular' ? -1 : (a.slotVariant === 'reverse' ? 0 : 1);
                } else {
                    if (a.name !== b.name) return sortOrder === 'name-asc' ? a.name.localeCompare(b.name) : b.name.localeCompare(a.name);
                    return a.slotVariant === 'regular' ? -1 : (a.slotVariant === 'reverse' ? 0 : 1);
                }
            });

            renderSlots(filteredSlots, masterSetSlots.length, masterSetSlots.filter(s => s.isCollected).length, isMasterSetMode);
        }

        function renderSlots(slotsToRender, totalSlotsGlobal, collectedSlotsGlobal, isMasterSetMode) {
            const container = document.getElementById('card-container');
            const statsContainer = document.getElementById('stats-container');
            const l = i18n[currentLang];
            container.innerHTML = '';

            slotsToRender.forEach(slot => {
                const slotDiv = document.createElement('div');
                slotDiv.className = `card-slot ${slot.slotClass} ${slot.isCollected ? 'collected' : ''}`;

                let topHtml = '';

                // INTEGRACIÓN DEL RECUADRO NEGRO (EXTRAÍDO DE REGISTRO COLECCION PO)
                if (slot.tagType === 'gold-star') {
                    const starClass = slot.starStyle === 'silver' ? 'silver-star' : (slot.starStyle === 'rainbow' ? 'rainbow-star' : 'gold-star');
                    let starsHtml = '';
                    const count = slot.starCount || 1;
                    
                    for (let i = 0; i < count; i++) {
                        starsHtml += `<span class="${starClass}">★</span>`;
                    }

                    topHtml = `
                        <div class="high-rarity-tag">
                            <div class="stars-container">${starsHtml}</div>
                            <span class="high-rarity-text">${slot.displayRarity}</span>
                        </div>`;
                } else {
                    topHtml = `<span class="variant-badge ${slot.badgeClass}">${slot.badgeText}</span>`;
                }

                const buttonText   = slot.isCollected ? l.cardCollected : l.cardMissing;
                const numberText   = `Nº ${slot.number} / ${slot.set.printedTotal}`;
                const highResImage = slot.images.large || slot.images.small;

                slotDiv.innerHTML = `
                    <div style="min-height: 24px; margin-bottom: 6px; display: flex; justify-content: center; width: 100%; box-sizing: border-box;">
                        ${topHtml}
                    </div>
                    <div>
                        <div class="img-container" onclick="openPreview('${highResImage}')" title="${currentLang === 'es' ? 'Ampliar' : 'Enlarge'}">
                            <img src="${slot.images.small}" alt="${slot.name}" loading="lazy">
                        </div>
                        <div class="card-info">
                            <span class="card-name" title="${slot.name}">${slot.name}</span>
                            <span class="card-number">${numberText}</span>
                            <span class="card-rarity" title="${slot.displayRarity}">${slot.displayRarity}</span>
                        </div>
                    </div>
                    <button class="action-button">
                        ${buttonText}
                    </button>
                `;

                // Event listener dinámico de guardado Firebase
                slotDiv.querySelector('.action-button').addEventListener('click', () => {
                    toggleSlot(slot.id, slot.slotVariant);
                });

                container.appendChild(slotDiv);
            });

            if (slotsToRender.length === 0) {
                container.innerHTML = `<div style="grid-column: 1/-1; text-align: center; color: #aaa; margin-top: 30px; font-size: 1.1em;">${l.noSlots}</div>`;
            }

            const percentage = totalSlotsGlobal > 0 ? ((collectedSlotsGlobal / totalSlotsGlobal) * 100).toFixed(1) : 0;
            const labelProgress = isMasterSetMode ? l.progressMaster : l.progressNormal;
            statsContainer.innerText = `${labelProgress} [${currentSetId.toUpperCase()}]: ${collectedSlotsGlobal} / ${totalSlotsGlobal} ${l.slotsCompleted} (${percentage}%)`;
        }

        function openPreview(url) {
            const modal = document.getElementById('preview-modal');
            const img = document.getElementById('preview-img');
            img.src = url;
            modal.style.display = 'flex';
        }

        function closePreview() {
            document.getElementById('preview-modal').style.display = 'none';
            document.getElementById('preview-img').src = '';
        }
    </script>
